version: '3.8'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: RestaurantDb
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
      build: .
      ports:
        - "8080:8080"
      environment:
           ConnectionStrings__PostgresConnection: Host=db;Port=5432;Database=RestaurantDb;Username=postgres;Password=${DB_PASSWORD}
           Jwt__Key: ${JWT_SECRET_KEY}
      depends_on:
        - db
      restart: always
volumes:
  postgres_data: